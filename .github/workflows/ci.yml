name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App validation and iOS export smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Dependency audit (High/Critical)
        run: npm audit --omit=dev --audit-level=high

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Expo iOS export smoke test
        run: npx expo export --platform ios --clear

  contracts:
    name: Contract compile and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install contract dependencies
        run: npm ci --legacy-peer-deps

      - name: Contract dependency audit (High/Critical)
        run: npm audit --omit=dev --audit-level=high

      - name: Compile contracts
        run: npm run compile

      - name: Test contracts
        run: npm test

